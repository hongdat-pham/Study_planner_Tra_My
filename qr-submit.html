<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>📱 Nộp bài qua QR</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600&family=Outfit:wght@300;400;500;600&family=Sacramento&display=swap" rel="stylesheet">
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getDatabase,ref,set,get,onValue,push,update}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const cfg={apiKey:"AIzaSyC7FRkytqmcRGq0Th1Sg3Mt6gy96LJctRQ",authDomain:"study-planner-01.firebaseapp.com",databaseURL:"https://study-planner-01-default-rtdb.firebaseio.com",projectId:"study-planner-01",storageBucket:"study-planner-01.firebasestorage.app",messagingSenderId:"540883054890",appId:"1:540883054890:web:6c0ea1847ecff80465ae53"};
try{const app=initializeApp(cfg);const db=getDatabase(app);window._FB={db,ref,set,get,onValue,push,update};window._FB_READY=true;}catch(e){window._FB_FAILED=true;}
</script>
<style>
:root{--p0:#fff8fb;--p1:#ffe8f3;--p2:#ffd0e8;--p3:#ffadd4;--p4:#ff80bc;--p5:#f050a0;--rose:#ff6bae;--ink:#2a0f1e;--ink3:#9a5070;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--p0);color:var(--ink);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 40px}
.wrap{max-width:420px;width:100%}
.brand{text-align:center;margin-bottom:22px}
.brand-script{font-family:'Sacramento',cursive;font-size:1.8rem;color:var(--rose)}
.brand-h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;line-height:1.1;margin:3px 0 5px}
.brand-h1 em{color:var(--p5);font-style:italic}
.brand-sub{font-size:.8rem;color:var(--ink3)}
.card{background:rgba(255,255,255,.92);border-radius:22px;border:1px solid var(--p2);box-shadow:0 8px 32px rgba(200,50,120,.12);padding:24px}
.field{margin-bottom:14px}
.field label{font-size:.72rem;color:var(--ink3);font-weight:500;display:block;margin-bottom:5px}
.inp{width:100%;padding:11px 15px;border-radius:13px;border:1.5px solid var(--p2);background:rgba(255,255,255,.9);font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--ink);outline:none;transition:all .2s}
.inp:focus{border-color:var(--p4);box-shadow:0 0 0 3px rgba(255,128,188,.14)}
.btn{width:100%;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:500;padding:13px;border-radius:50px;border:none;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-rose{background:linear-gradient(135deg,var(--rose),var(--p5));color:#fff;box-shadow:0 4px 16px rgba(240,80,160,.3)}
.btn-rose:hover{transform:translateY(-2px)}
.btn-rose:disabled{opacity:.5;transform:none;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ink3);border:1.5px solid #e8d0dc}
.btn-ghost:hover{background:var(--p1);color:var(--p5)}
.cam-zone{border:2px dashed var(--p3);border-radius:16px;padding:18px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:14px;background:white}
.cam-zone:hover{background:var(--p0);border-color:var(--p4)}
.cam-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cam-zone img{max-width:100%;max-height:260px;border-radius:10px;object-fit:contain;pointer-events:none}
.cam-zone.has-img{padding:8px}
.err{font-size:.78rem;color:#e53935;background:#fff5f5;border:1px solid #ffcdd2;border-radius:10px;padding:9px 12px;margin-bottom:12px;display:none}
.err.show{display:block}
.user-info-bar{display:flex;align-items:center;gap:10px;background:var(--p1);border-radius:14px;padding:10px 14px;margin-bottom:16px;border:1px solid var(--p2)}
.user-ava{font-size:1.6rem}
.user-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600}
.user-sub{font-size:.7rem;color:var(--ink3)}
#successView{display:none;text-align:center}
@keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.success-ico{font-size:3.5rem;animation:pop .4s both;margin-bottom:10px}
.success-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:300;margin-bottom:6px}
.success-sub{font-size:.84rem;color:var(--ink3);line-height:1.6;margin-bottom:14px}
.preview-full{width:100%;max-height:260px;border-radius:12px;object-fit:contain;border:2px solid var(--p2);margin-bottom:14px;cursor:pointer}
/* Challenge selector */
.ch-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.ch-opt{padding:10px 14px;border-radius:12px;border:1.5px solid var(--p2);background:white;cursor:pointer;transition:all .2s;font-size:.85rem}
.ch-opt:hover{border-color:var(--p4);background:var(--p0)}
.ch-opt.selected{border-color:var(--p5);background:linear-gradient(135deg,#fff0f8,white)}
.ch-opt-name{font-weight:600;color:var(--ink)}
.ch-opt-meta{font-size:.7rem;color:var(--ink3);margin-top:2px}
/* Auth mini form */
.auth-mini{background:var(--p0);border-radius:16px;padding:16px;border:1.5px dashed var(--p3);margin-bottom:16px}
.auth-mini-title{font-size:.78rem;font-weight:600;color:var(--ink2);margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-script">nộp bài qua điện thoại 📱</div>
    <h1 class="brand-h1">Nộp bài <em>của bạn</em></h1>
    <p class="brand-sub">Chụp ảnh bài làm và nộp vào phòng học</p>
  </div>

  <div class="card" id="formView">
    <div class="err" id="errBox"></div>
    <!-- User info (auto-filled from session) -->
    <div id="userInfoBar" style="display:none"></div>
    <!-- Mini auth if not logged in -->
    <div id="authMini" class="auth-mini" style="display:none">
      <div class="auth-mini-title">🔐 Đăng nhập để nộp bài</div>
      <div class="field"><label>Tên đăng nhập</label><input class="inp" id="qrU" placeholder="username..."></div>
      <div class="field"><label>Mật khẩu</label><input class="inp" id="qrP" type="password" placeholder="Mật khẩu..." onkeydown="if(event.key==='Enter')qrLogin()"></div>
      <button class="btn btn-rose" onclick="qrLogin()" style="margin-bottom:0">🌸 Đăng nhập</button>
    </div>
    <!-- Challenge selector -->
    <div id="chSelector" style="display:none">
      <div class="field" style="margin-bottom:8px"><label>Chọn thử thách để nộp bài</label></div>
      <div class="ch-list" id="chList"></div>
    </div>
    <!-- Photo upload -->
    <div id="photoSection" style="display:none">
      <div class="field">
        <label>Ảnh bài làm — nhấn để chụp hoặc chọn ảnh</label>
        <div class="cam-zone" id="camZone">
          <input type="file" id="imgInput" accept="image/*" capture="environment" onchange="onImgSelect(this)">
          <div id="camPlaceholder">
            <div style="font-size:2.5rem;margin-bottom:7px">📸</div>
            <div style="font-size:.85rem;color:var(--ink3)">Chụp ảnh / Chọn ảnh từ thư viện</div>
            <div style="font-size:.72rem;color:var(--p5);margin-top:4px">Nhấn vào đây</div>
          </div>
          <img id="imgPreview" style="display:none" alt="preview">
        </div>
      </div>
      <button class="btn btn-rose" id="submitBtn" onclick="doSubmit()" style="display:none">📎 Nộp bài ngay!</button>
    </div>
    <button class="btn btn-ghost" style="margin-top:10px;font-size:.8rem;padding:9px" onclick="window.history.back()">← Quay lại</button>
  </div>

  <div class="card" id="successView">
    <div class="success-ico">🎉</div>
    <div class="success-title">Đã nộp bài!</div>
    <div class="success-sub" id="successMsg">Bài của bạn đã gửi vào phòng học thành công. Mọi người có thể xem ngay trên máy tính! 🌸</div>
    <img id="successThumb" class="preview-full" src="" alt="bài nộp" onclick="window.open(this.src,'_blank')">
    <button class="btn btn-rose" onclick="resetForm()">📎 Nộp thêm bài khác</button>
    <button class="btn btn-ghost" style="margin-top:8px;font-size:.8rem;padding:9px" onclick="window.close()">✕ Đóng</button>
  </div>
</div>

<script>
let currentUser=null; // {uid, name, avatar, slotId}
let selectedChId=null;
let selectedImageData=null;
let challenges={};

function getParam(k){return new URLSearchParams(location.search).get(k)}
function showErr(m){const e=document.getElementById('errBox');e.textContent=m;e.classList.add('show')}
function hideErr(){document.getElementById('errBox').classList.remove('show')}

window.addEventListener('load',async()=>{
  // Try to get session from URL param
  const sessParam=getParam('sess');
  if(sessParam){
    try{
      const sess=JSON.parse(decodeURIComponent(sessParam));
      if(sess&&sess.uid&&sess.name){
        // Verify account still exists
        if(window._FB_READY){
          const acc=await DB.get(`accounts/${sess.uid}`);
          if(acc){currentUser={...sess,name:acc.name,avatar:acc.avatar};renderUserBar();loadChallenges();return;}
        }
      }
    }catch(e){}
  }
  // Also check local session
  try{
    const local=localStorage.getItem('studyroom_session');
    if(local){const s=JSON.parse(local);if(s.uid&&s.name){currentUser={...s};renderUserBar();loadChallenges();return;}}
  }catch(e){}
  // Show login form
  document.getElementById('authMini').style.display='block';
});

const DB={
  async get(p){const{db,ref,get}=window._FB;const s=await get(ref(db,p));return s.exists()?s.val():null},
  async push(p,v){const r=await window._FB.push(window._FB.ref(window._FB.db,p),v);return r.key},
  async update(p,v){await window._FB.update(window._FB.ref(window._FB.db,p),v)},
  listen(p,cb){return window._FB.onValue(window._FB.ref(window._FB.db,p),s=>cb(s.exists()?s.val():null))}
};

async function qrLogin(){
  const u=document.getElementById('qrU').value.trim().toLowerCase(),p=document.getElementById('qrP').value;
  if(!u||!p){showErr('Nhập đủ thông tin nhé!');return}
  const acc=await DB.get(`accounts/${u}`).catch(()=>null);
  if(!acc){showErr('Tên đăng nhập không tồn tại!');return}
  if(acc.password!==btoa(p)){showErr('Sai mật khẩu!');return}
  currentUser={uid:u,username:u,name:acc.name,avatar:acc.avatar};
  localStorage.setItem('studyroom_session',JSON.stringify(currentUser));
  document.getElementById('authMini').style.display='none';
  renderUserBar();loadChallenges();
}

function renderUserBar(){
  const bar=document.getElementById('userInfoBar');
  bar.style.display='flex';
  bar.innerHTML=`<div class="user-ava">${currentUser.avatar||'👤'}</div><div><div class="user-name">${currentUser.name}</div><div class="user-sub">Đang nộp bài với tài khoản này</div></div>`;
  // Find my slot
  DB.get('room/slots').then(slots=>{
    if(!slots)return;
    for(const[sid,s]of Object.entries(slots)){if(s.uid===currentUser.uid&&s.online){currentUser.slotId=sid;break}}
  });
}

async function loadChallenges(){
  if(!window._FB_READY)return;
  DB.listen('room/challenges',snap=>{
    challenges=snap||{};
    renderChSelector();
  });
}

function renderChSelector(){
  const active=Object.entries(challenges).filter(([,ch])=>!ch.stopped&&ch.deadline>Date.now());
  const sel=document.getElementById('chSelector');
  if(!active.length){
    sel.style.display='none';
    // Show photo section directly
    showPhotoSection();
    return;
  }
  sel.style.display='block';
  document.getElementById('chList').innerHTML=active.map(([id,ch])=>`<div class="ch-opt${id===selectedChId?' selected':''}" onclick="selectCh('${id}')">
    <div class="ch-opt-name">🎯 ${esc(ch.name)}</div>
    <div class="ch-opt-meta">${ch.type==='duration'?`Học trong ${ch.val} phút`:`Xong trước ${ch.val} giờ`}${ch.subj?' · '+ch.subj:''}</div>
  </div>`).join('');
  if(!selectedChId&&active.length===1){selectCh(active[0][0]);}
}

function selectCh(id){
  selectedChId=id;
  document.querySelectorAll('.ch-opt').forEach(el=>el.classList.toggle('selected',el.onclick?.toString().includes(`'${id}'`)));
  // Re-render to show selection
  const active=Object.entries(challenges).filter(([,ch])=>!ch.stopped&&ch.deadline>Date.now());
  document.getElementById('chList').innerHTML=active.map(([cid,ch])=>`<div class="ch-opt${cid===selectedChId?' selected':''}" onclick="selectCh('${cid}')">
    <div class="ch-opt-name">🎯 ${esc(ch.name)}</div>
    <div class="ch-opt-meta">${ch.type==='duration'?`Học trong ${ch.val} phút`:`Xong trước ${ch.val} giờ`}${ch.subj?' · '+ch.subj:''}</div>
  </div>`).join('');
  showPhotoSection();
}

function showPhotoSection(){document.getElementById('photoSection').style.display='block';}

function onImgSelect(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    selectedImageData=e.target.result;
    const preview=document.getElementById('imgPreview'),ph=document.getElementById('camPlaceholder');
    preview.src=selectedImageData;preview.style.display='block';ph.style.display='none';
    document.getElementById('camZone').classList.add('has-img');
    document.getElementById('submitBtn').style.display='block';
  };
  reader.readAsDataURL(file);
}

async function doSubmit(){
  hideErr();
  if(!currentUser){showErr('Đăng nhập trước nhé!');return}
  if(!selectedImageData){showErr('Chọn ảnh bài làm nhé!');return}
  if(!window._FB_READY){showErr('Đang kết nối, thử lại sau!');return}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='Đang nộp...';
  try{
    const subKey=`${currentUser.slotId||'qr'}_${Date.now()}`;
    const subData={
      slotId:currentUser.slotId||'qr_'+Date.now(),uid:currentUser.uid,
      name:currentUser.name,avatar:currentUser.avatar||'📱',
      fileName:`ảnh_${currentUser.name}_${new Date().toLocaleTimeString('vi')}.jpg`,
      imageData:selectedImageData,uploadedAt:Date.now(),fromQR:true
    };
    if(selectedChId&&challenges[selectedChId]){
      await DB.update(`room/challenges/${selectedChId}/submissions/${subKey}`,subData);
    }
    // Also save to user slot uploads
    if(currentUser.slotId){
      await DB.update(`room/slots/${currentUser.slotId}/uploads/${subKey}`,{
        fileName:subData.fileName,imageData:selectedImageData,uploadedAt:Date.now(),
        challengeName:selectedChId&&challenges[selectedChId]?challenges[selectedChId].name:'Bài nộp QR'
      });
    }
    // Show success
    document.getElementById('formView').style.display='none';
    document.getElementById('successView').style.display='block';
    document.getElementById('successMsg').textContent=`Bài của ${currentUser.name} đã nộp thành công! Mọi người có thể xem ngay trên máy tính 🌸`;
    document.getElementById('successThumb').src=selectedImageData;
  }catch(e){
    showErr('Lỗi nộp bài, thử lại nhé!');
    btn.disabled=false;btn.textContent='📎 Nộp bài ngay!';
  }
}

function resetForm(){
  selectedImageData=null;selectedChId=null;
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgPreview').src='';
  document.getElementById('camPlaceholder').style.display='flex';
  document.getElementById('camZone').classList.remove('has-img');
  document.getElementById('imgInput').value='';
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('submitBtn').textContent='📎 Nộp bài ngay!';
  document.getElementById('formView').style.display='block';
  document.getElementById('successView').style.display='none';
  hideErr();
  renderChSelector();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body>
</html>
